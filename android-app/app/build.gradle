plugins {
    id 'com.android.application'
}

android {
    namespace 'com.sawwarni.app'
    compileSdk 35

    defaultConfig {
        applicationId 'com.sawwarni.app'
        minSdk 24
        targetSdk 35
        versionCode 1
        versionName '1.0.0-test'
    }

    buildTypes {
        debug {
            applicationIdSuffix '.debug'
            versionNameSuffix '-debug'
        }
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
